<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Presentation Title — Bohemia Interactive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Barlow+Condensed:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ── CORE STYLES (extracted & cleaned) ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bi-green: #6ba539;
      --bi-green-dark: #417714;
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #181818;
      --text: #f0f0ee;
      --dim: rgba(240,240,238,0.45);
      --border: rgba(255,255,255,0.08);
      --slide-pad: clamp(40px, 6vw, 96px);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* Deck & Slides */
    #deck { width: 100vw; height: 100vh; position: relative; overflow: hidden; }

    .slide {
      position: absolute; inset: 0;
      display: flex; opacity: 0; pointer-events: none;
      transition: opacity 0.55s cubic-bezier(0.4,0,0.2,1),
                  transform 0.55s cubic-bezier(0.4,0,0.2,1);
      transform: translateY(30px);
      overflow-y: auto;
    }
    .slide.active { opacity: 1; pointer-events: all; transform: translateY(0); z-index: 2; }
    .slide.exit { opacity: 0; transform: translateY(-30px); z-index: 1; }

    /* Nav Bar */
    #nav-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 52px; z-index: 100;
      display: flex; align-items: center; padding: 0 28px;
      background: rgba(10,10,10,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); margin-right: 32px; }
    .nav-progress { display: flex; align-items: center; gap: 6px; flex: 1; }
    .nav-dot {
      width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2);
      cursor: pointer; transition: all 0.3s;
    }
    .nav-dot.active { background: var(--bi-green); transform: scale(1.4); }
    .nav-label { margin-left: auto; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; color: var(--dim); text-transform: uppercase; }
    .slide-counter { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; color: var(--dim); letter-spacing: 0.05em; margin-left: 24px; }

    /* Arrows */
    .arrow-btn {
      position: fixed; bottom: 32px; width: 44px; height: 44px; border-radius: 50%;
      background: none; border: 1px solid var(--border); color: rgba(255,255,255,0.5);
      cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center;
      z-index: 100; transition: all 0.2s;
    }
    .arrow-btn:hover { border-color: var(--bi-green); color: var(--bi-green); background: rgba(107,165,57,0.1); }
    #btn-prev { right: 100px; }
    #btn-next { right: 44px; }

    /* Common Layout */
    .slide-inner {
      width: 100%; max-width: 1200px; margin: 0 auto;
      padding: calc(52px + 64px) var(--slide-pad) 80px;
      display: flex; flex-direction: column; justify-content: center; min-height: 100vh;
    }
    .slide-tag {
      font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--bi-green);
      margin-bottom: 18px; display: flex; align-items: center; gap: 10px;
    }
    .slide-tag::before { content: ''; display: block; width: 32px; height: 2px; background: var(--bi-green); }

    .slide-title {
      font-family: 'Barlow Condensed', sans-serif; font-size: clamp(42px, 7vw, 90px);
      font-weight: 900; line-height: 0.92; text-transform: uppercase; letter-spacing: -0.01em;
      color: #fff; margin-bottom: 32px;
    }
    .slide-title .hl { background: var(--bi-green); padding: 0 8px; }

    .slide-body {
      font-size: clamp(15px, 1.6vw, 18px); line-height: 1.65;
      color: rgba(240,240,238,0.7); max-width: 680px;
    }
    .slide-body strong { color: #fff; font-weight: 600; }

    /* Add more component styles here as needed (two-col, stats, cards, etc.) */

  </style>
</head>
<body>

  <!-- NAV -->
  <nav id="nav-bar">
    <div class="nav-logo">Bohemia Interactive</div>
    <div class="nav-progress" id="nav-dots"></div>
    <span class="nav-label" id="nav-slide-label"></span>
    <span class="slide-counter" id="slide-counter"></span>
  </nav>

  <!-- DECK -->
  <div id="deck">

    <!-- SLIDE 0: Cover -->
    <div class="slide active" id="slide-0">
      <div class="slide-inner">
        <div class="slide-tag">Presentation Title</div>
        <h1 class="slide-title">Main Title Goes<br>Here <span class="hl">Highlight</span></h1>
        <p class="slide-body">Subtitle or short description. Keep it punchy.</p>
        <p style="margin-top:60px; font-size:13px; color:var(--dim);">Your Name • May 2026</p>
      </div>
    </div>

    <!-- Add more slides here following the same pattern -->

  </div>

  <!-- CONTROLS -->
  <button class="arrow-btn" id="btn-prev" onclick="changeSlide(-1)" title="Previous">←</button>
  <button class="arrow-btn" id="btn-next" onclick="changeSlide(1)" title="Next">→</button>
  <div class="key-hint" style="position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--dim);white-space:nowrap;">← → arrows • click dots to jump</div>

<script>
  const SLIDES = [
    { label: 'Cover' },
    { label: 'Section 1' },
    { label: 'Section 2' },
    { label: 'Section 3' },
    // Add more as you create slides
  ];

  let current = 0;
  const total = SLIDES.length;

  const deck = document.getElementById('deck');
  const slideEls = deck.querySelectorAll('.slide');
  const dotsEl = document.getElementById('nav-dots');
  const labelEl = document.getElementById('nav-slide-label');
  const counterEl = document.getElementById('slide-counter');

  // Build dots
  SLIDES.forEach((s, i) => {
    const dot = document.createElement('div');
    dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
    dot.title = s.label;
    dot.onclick = () => goTo(i);
    dotsEl.appendChild(dot);
  });

  function updateUI() {
    dotsEl.querySelectorAll('.nav-dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });
    labelEl.textContent = SLIDES[current].label;
    counterEl.textContent = (current + 1) + ' / ' + total;
  }

  function goTo(n) {
    if (n === current) return;
    const prev = current;
    current = Math.max(0, Math.min(total - 1, n));

    slideEls[prev].classList.remove('active');
    slideEls[prev].classList.add('exit');
    setTimeout(() => slideEls[prev].classList.remove('exit'), 600);

    slideEls[current].classList.add('active');
    slideEls[current].scrollTop = 0;
    updateUI();
  }

  function changeSlide(dir) {
    goTo(current + dir);
  }

  // Keyboard & Touch
  document.addEventListener('keydown', e => {
    if (['ArrowRight','ArrowDown',' ','PageDown'].includes(e.key)) { e.preventDefault(); changeSlide(1); }
    else if (['ArrowLeft','ArrowUp','PageUp'].includes(e.key)) { e.preventDefault(); changeSlide(-1); }
  });

  let touchX = 0;
  deck.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
  deck.addEventListener('touchend', e => {
    const dx = touchX - e.changedTouches[0].clientX;
    if (Math.abs(dx) > 50) changeSlide(dx > 0 ? 1 : -1);
  });

  updateUI();
</script>
</body>
</html>
